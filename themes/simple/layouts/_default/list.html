{{ define "main" }}
  <h1>{{ .Title }}</h1>
  {{ with .Content }}<div class="page-content">{{ . }}</div>{{ end }}

  <ul class="post-list">
    {{ range .RegularPagesRecursive.ByDate.Reverse }}
      <li>
        <time datetime="{{ .Date.Format "2006-01-02" }}">{{ .Date.Format "Jan 2, 2006" }}</time>
        <a href="{{ .RelPermalink }}">{{ .Title }}</a>
        {{ with .Description }}<p class="post-summary">{{ . }}</p>{{ end }}
      </li>
    {{ end }}
  </ul>
{{ end }}
